<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FoodieDash | Online Food Ordering System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Poppins', sans-serif;
        }
        
        body {
            background: #fef9f0;
            color: #2d2a24;
            padding: 20px;
        }
        /* App container */
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* header + logout */
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ff7b2c;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }
        
        .logo span {
            background: white;
            color: #ff7b2c;
            padding: 0 8px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 18px;
            border-radius: 40px;
        }
        
        .role-badge {
            background: #2d2a24;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        button {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-logout {
            background: #2d2a24;
            color: white;
        }
        
        .btn-logout:hover {
            background: #111;
        }
        
        button:active {
            transform: scale(0.96);
        }
        /* dashboard panels */
        
        .panel {
            background: white;
            border-radius: 32px;
            padding: 24px 28px;
            margin-bottom: 32px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }
        
        .panel h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            border-left: 8px solid #ff7b2c;
            padding-left: 18px;
        }
        
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 28px;
        }
        
        .card {
            background: #fffaf5;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #ffe3cc;
        }
        
        .card h3 {
            margin-bottom: 16px;
            font-size: 1.35rem;
        }
        
        .form-group {
            margin-bottom: 14px;
        }
        
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 28px;
            border: 1px solid #ffd9b5;
            background: white;
            outline: none;
        }
        
        .btn-primary {
            background: #ff7b2c;
            color: white;
            margin-top: 8px;
            width: 100%;
        }
        
        .btn-secondary {
            background: #2d2a24;
            color: white;
        }
        
        .item-list {
            margin-top: 16px;
            max-height: 280px;
            overflow-y: auto;
        }
        
        .menu-row,
        .cat-row {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 10px 14px;
            border-radius: 40px;
            margin-bottom: 8px;
            align-items: center;
            border: 1px solid #ffedd9;
        }
        
        .badge {
            background: #ff7b2c10;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .action-group button {
            margin-left: 6px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            text-align: left;
            padding: 12px 6px;
            border-bottom: 1px solid #ffe0c0;
        }
        
        .order-status {
            background: #ffe1b9;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #ffdbb5;
        }
        
        .total {
            font-weight: 800;
            font-size: 1.3rem;
            margin-top: 12px;
            text-align: right;
        }
        
        .btn-order {
            background: #2e7d32;
            width: 100%;
            margin-top: 16px;
        }
        
        .report-card {
            background: #f7f2ea;
            border-radius: 24px;
            padding: 18px;
        }
        
        hr {
            margin: 16px 0;
        }
        
        @media (max-width: 760px) {
            .panel {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="app" id="app">
        <!-- dynamic content will be rendered here -->
    </div>

    <script>
        // ---------- DATA MODELS (In-memory DB with localStorage persistence) ----------
        const STORAGE_KEYS = {
            users: 'food_users',
            customers: 'food_customers',
            categories: 'food_categories',
            menu_items: 'food_menu_items',
            orders: 'food_orders',
            order_items: 'food_order_items'
        };

        // default seed data
        function initData() {
            // users: admin & sample customer
            if (!localStorage.getItem(STORAGE_KEYS.users)) {
                const users = [{
                    id: 1,
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin'
                }, {
                    id: 2,
                    username: 'john_doe',
                    password: 'cust123',
                    role: 'customer',
                    customerId: 1
                }];
                localStorage.setItem(STORAGE_KEYS.users, JSON.stringify(users));
            }
            // customers
            if (!localStorage.getItem(STORAGE_KEYS.customers)) {
                const customers = [{
                    id: 1,
                    name: 'John Doe',
                    email: 'john@example.com',
                    phone: '555-1234',
                    userId: 2
                }];
                localStorage.setItem(STORAGE_KEYS.customers, JSON.stringify(customers));
            }
            // categories
            if (!localStorage.getItem(STORAGE_KEYS.categories)) {
                const categories = [{
                    id: 1,
                    name: 'Pizzas',
                    description: 'Hot & cheesy'
                }, {
                    id: 2,
                    name: 'Burgers',
                    description: 'Grilled perfection'
                }, {
                    id: 3,
                    name: 'Salads',
                    description: 'Fresh greens'
                }, {
                    id: 4,
                    name: 'Beverages',
                    description: 'Soft drinks & juices'
                }];
                localStorage.setItem(STORAGE_KEYS.categories, JSON.stringify(categories));
            }
            // menu items
            if (!localStorage.getItem(STORAGE_KEYS.menu_items)) {
                const items = [{
                    id: 1,
                    name: 'Margherita Pizza',
                    price: 12.99,
                    category_id: 1,
                    available: true
                }, {
                    id: 2,
                    name: 'Pepperoni Feast',
                    price: 15.49,
                    category_id: 1,
                    available: true
                }, {
                    id: 3,
                    name: 'Classic Cheeseburger',
                    price: 9.99,
                    category_id: 2,
                    available: true
                }, {
                    id: 4,
                    name: 'Vegan Burger',
                    price: 11.49,
                    category_id: 2,
                    available: true
                }, {
                    id: 5,
                    name: 'Caesar Salad',
                    price: 8.99,
                    category_id: 3,
                    available: true
                }, {
                    id: 6,
                    name: 'Iced Tea',
                    price: 2.99,
                    category_id: 4,
                    available: true
                }];
                localStorage.setItem(STORAGE_KEYS.menu_items, JSON.stringify(items));
            }
            if (!localStorage.getItem(STORAGE_KEYS.orders)) {
                localStorage.setItem(STORAGE_KEYS.orders, JSON.stringify([]));
                localStorage.setItem(STORAGE_KEYS.order_items, JSON.stringify([]));
            }
        }

        // helpers
        function getData(key) {
            return JSON.parse(localStorage.getItem(key)) || [];
        }

        function setData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // Global state
        let currentUser = null; // { id, username, role, customerId? }

        // Helper: get customer by userId
        function getCustomerByUserId(userId) {
            const customers = getData(STORAGE_KEYS.customers);
            return customers.find(c => c.userId === userId) || null;
        }

        // ---------- AUTH ----------
        function login(username, password) {
            const users = getData(STORAGE_KEYS.users);
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) return false;
            let customerId = null;
            if (user.role === 'customer') {
                const cust = getCustomerByUserId(user.id);
                customerId = cust ? cust.id : null;
                if (!customerId) return false; // no customer record
            }
            currentUser = {...user,
                customerId
            };
            return true;
        }

        function logout() {
            currentUser = null;
            renderApp();
        }

        // ---------- BUSINESS LOGIC ----------
        // Category CRUD (admin)
        function addCategory(name, description) {
            const cats = getData(STORAGE_KEYS.categories);
            const newId = cats.length ? Math.max(...cats.map(c => c.id)) + 1 : 1;
            cats.push({
                id: newId,
                name,
                description
            });
            setData(STORAGE_KEYS.categories, cats);
            renderApp();
        }

        function updateCategory(id, name, description) {
            let cats = getData(STORAGE_KEYS.categories);
            cats = cats.map(c => c.id === id ? {...c,
                name,
                description
            } : c);
            setData(STORAGE_KEYS.categories, cats);
            renderApp();
        }

        function deleteCategory(id) {
            let cats = getData(STORAGE_KEYS.categories);
            cats = cats.filter(c => c.id !== id);
            setData(STORAGE_KEYS.categories, cats);
            // optional: remove category from menu items? just keep category id orphan but fine.
            renderApp();
        }

        // Menu items CRUD (admin)
        function addMenuItem(name, price, category_id, available) {
            const items = getData(STORAGE_KEYS.menu_items);
            const newId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;
            items.push({
                id: newId,
                name,
                price: parseFloat(price),
                category_id: parseInt(category_id),
                available: available === 'true' || available === true
            });
            setData(STORAGE_KEYS.menu_items, items);
            renderApp();
        }

        function updateMenuItem(id, name, price, category_id, available) {
            let items = getData(STORAGE_KEYS.menu_items);
            items = items.map(i => i.id === id ? {...i,
                name,
                price: parseFloat(price),
                category_id: parseInt(category_id),
                available: available === 'true' || available === true
            } : i);
            setData(STORAGE_KEYS.menu_items, items);
            renderApp();
        }

        function deleteMenuItem(id) {
            let items = getData(STORAGE_KEYS.menu_items);
            items = items.filter(i => i.id !== id);
            setData(STORAGE_KEYS.menu_items, items);
            renderApp();
        }

        // Place order (customer)
        let customerCart = []; // each item: { menuItemId, name, price, quantity }
        function addToCart(menuItem) {
            const existing = customerCart.find(i => i.menuItemId === menuItem.id);
            if (existing) existing.quantity += 1;
            else customerCart.push({
                menuItemId: menuItem.id,
                name: menuItem.name,
                price: menuItem.price,
                quantity: 1
            });
            renderApp(); // refresh customer panel
        }

        function removeFromCart(menuItemId) {
            customerCart = customerCart.filter(i => i.menuItemId !== menuItemId);
            renderApp();
        }

        function updateQuantity(menuItemId, delta) {
            const idx = customerCart.findIndex(i => i.menuItemId === menuItemId);
            if (idx !== -1) {
                const newQty = customerCart[idx].quantity + delta;
                if (newQty <= 0) customerCart.splice(idx, 1);
                else customerCart[idx].quantity = newQty;
                renderApp();
            }
        }

        function getCartTotal() {
            return customerCart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        }

        function placeOrder() {
            if (!currentUser || currentUser.role !== 'customer') return alert('Please login as customer');
            if (customerCart.length === 0) return alert('Cart is empty');
            const orders = getData(STORAGE_KEYS.orders);
            const orderItemsStore = getData(STORAGE_KEYS.order_items);
            const newOrderId = orders.length ? Math.max(...orders.map(o => o.id)) + 1 : 1;
            const totalAmount = getCartTotal();
            const newOrder = {
                id: newOrderId,
                customer_id: currentUser.customerId,
                order_date: new Date().toISOString(),
                status: 'Pending', // status flow: Pending -> Confirmed -> Completed/Cancelled (admin can change)
                total_amount: totalAmount
            };
            orders.push(newOrder);
            // create order_items
            for (let cart of customerCart) {
                orderItemsStore.push({
                    id: orderItemsStore.length ? Math.max(...orderItemsStore.map(oi => oi.id), 0) + 1 : 1,
                    order_id: newOrderId,
                    menu_item_id: cart.menuItemId,
                    quantity: cart.quantity,
                    unit_price: cart.price
                });
            }
            setData(STORAGE_KEYS.orders, orders);
            setData(STORAGE_KEYS.order_items, orderItemsStore);
            customerCart = []; // empty cart
            renderApp();
            alert(`Order #${newOrderId} placed! Total: $${totalAmount.toFixed(2)}`);
        }

        // Admin: update order status
        function updateOrderStatus(orderId, newStatus) {
            let orders = getData(STORAGE_KEYS.orders);
            orders = orders.map(o => o.id === orderId ? {...o,
                status: newStatus
            } : o);
            setData(STORAGE_KEYS.orders, orders);
            renderApp();
        }

        // Reports data aggregation
        function getDailyMonthlySalesReport(period = 'monthly') { // simple: all orders or last 30 days
            const orders = getData(STORAGE_KEYS.orders);
            const now = new Date();
            const filtered = orders.filter(o => {
                const d = new Date(o.order_date);
                if (period === 'daily') {
                    return d.toDateString() === now.toDateString();
                } else {
                    const monthAgo = new Date();
                    monthAgo.setDate(now.getDate() - 30);
                    return d >= monthAgo;
                }
            });
            const totalSales = filtered.reduce((sum, o) => sum + o.total_amount, 0);
            return {
                totalSales,
                orderCount: filtered.length,
                label: period === 'daily' ? 'Today' : 'Last 30 days'
            };
        }

        function getMostOrderedItems(limit = 5) {
            const orderItems = getData(STORAGE_KEYS.order_items);
            const menuItems = getData(STORAGE_KEYS.menu_items);
            const itemSales = {};
            orderItems.forEach(oi => {
                if (!itemSales[oi.menu_item_id]) itemSales[oi.menu_item_id] = 0;
                itemSales[oi.menu_item_id] += oi.quantity;
            });
            const sorted = Object.entries(itemSales).sort((a, b) => b[1] - a[1]).slice(0, limit);
            return sorted.map(([id, qty]) => {
                const item = menuItems.find(m => m.id === parseInt(id));
                return {
                    name: item ? item.name : 'Unknown',
                    quantity: qty,
                    price: item ? .price
                };
            });
        }

        function getCustomerOrderHistory(customerId) {
            const orders = getData(STORAGE_KEYS.orders);
            return orders.filter(o => o.customer_id === customerId).sort((a, b) => new Date(b.order_date) - new Date(a.order_date));
        }

        function getOrdersByStatus() {
            const orders = getData(STORAGE_KEYS.orders);
            const statusCount = {
                Pending: 0,
                Confirmed: 0,
                Completed: 0,
                Cancelled: 0
            };
            orders.forEach(o => {
                if (statusCount[o.status] !== undefined) statusCount[o.status]++;
                else statusCount[o.status] = 1;
            });
            return statusCount;
        }

        // get full orders with customer names for admin view
        function getAllOrdersWithDetails() {
            const orders = getData(STORAGE_KEYS.orders);
            const customers = getData(STORAGE_KEYS.customers);
            return orders.map(order => {
                const cust = customers.find(c => c.id === order.customer_id);
                return {...order,
                    customer_name: cust ? cust.name : 'Unknown'
                };
            }).sort((a, b) => new Date(b.order_date) - new Date(a.order_date));
        }

        // ---------- UI RENDERING (Login & Panels) ----------
        function renderLogin() {
            return `
      <div class="panel" style="max-width: 450px; margin: 80px auto;">
        <h2 style="text-align:center;">🍔 FoodieDash Login</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="admin / john_doe">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="admin123 / cust123">
        </div>
        <button id="doLoginBtn" class="btn-primary">Sign In</button>
        <p style="margin-top:16px; font-size:0.8rem;">Demo: admin/admin123 | customer: john_doe/cust123</p>
      </div>
    `;
        }

        // Admin Panel
        function renderAdmin() {
            const categories = getData(STORAGE_KEYS.categories);
            const menuItems = getData(STORAGE_KEYS.menu_items);
            const orders = getAllOrdersWithDetails();
            const salesReport = getDailyMonthlySalesReport('monthly');
            const topItems = getMostOrderedItems(5);
            const statusSummary = getOrdersByStatus();

            return `
      <div class="top-bar">
        <div class="logo">FoodieDash <span>Admin</span></div>
        <div class="user-info">👑 ${currentUser.username} <button class="btn-logout" id="logoutBtn">Logout</button></div>
      </div>
      <div class="grid-2col">
        <!-- Category Management -->
        <div class="card">
          <h3>📂 Category Management</h3>
          <div class="form-group"><input type="text" id="catName" placeholder="Category name"><input type="text" id="catDesc" placeholder="Description"></div>
          <button id="addCatBtn" class="btn-primary">Add Category</button>
          <div class="item-list" id="categoryList">
            ${categories.map(cat => `<div class="menu-row"><span><strong>${cat.name}</strong><br><small>${cat.description}</small></span><span><button class="editCatBtn" data-id="${cat.id}" data-name="${cat.name}" data-desc="${cat.description}">✏️</button><button class="delCatBtn" data-id="${cat.id}">🗑️</button></span></div>`).join('')}
          </div>
        </div>
        <!-- Menu Items -->
        <div class="card">
          <h3>🍕 Menu Management</h3>
          <div class="form-group"><input type="text" id="itemName" placeholder="Item name"><input type="number" id="itemPrice" placeholder="Price"><select id="itemCatId">${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select><select id="itemAvail"><option value="true">Available</option><option value="false">Unavailable</option></select><button id="addItemBtn" class="btn-primary">Add Item</button></div>
          <div class="item-list">
            ${menuItems.map(item => {
              const catName = categories.find(c=>c.id === item.category_id)?.name || '?';
              return `<div class="menu-row"><span><strong>${item.name}</strong> - $${item.price} (${catName}) ${item.available ? '✅' : '❌'}</span><span><button class="editItemBtn" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}" data-cat="${item.category_id}" data-avail="${item.available}">✏️</button><button class="delItemBtn" data-id="${item.id}">🗑️</button></span></div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <!-- Orders Management -->
      <div class="panel">
        <h2>📋 All Orders & Status</h2>
        <table>
          <thead><tr><th>ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>${orders.map(order => `<tr><td>#${order.id}</td><td>${order.customer_name}</td><td>${new Date(order.order_date).toLocaleString()}</td><td>$${order.total_amount.toFixed(2)}</td><td><span class="order-status">${order.status}</span></td><td><select class="statusSelect" data-id="${order.id}"><option ${order.status==='Pending'?'selected':''}>Pending</option><option ${order.status==='Confirmed'?'selected':''}>Confirmed</option><option ${order.status==='Completed'?'selected':''}>Completed</option><option ${order.status==='Cancelled'?'selected':''}>Cancelled</option></select></td></tr>`).join('')}</tbody>
        </table>
      </div>
      <!-- Reports Section -->
      <div class="grid-2col">
        <div class="report-card"><h3>📊 Sales Report (30 days)</h3><p>Total Sales: $${salesReport.totalSales.toFixed(2)} | Orders: ${salesReport.orderCount}</p><button id="dailyReportBtn" class="btn-secondary">View Today Sales</button></div>
        <div class="report-card"><h3>🔥 Top 5 Most Ordered</h3><ul>${topItems.map(t => `<li>${t.name} - sold ${t.quantity} times</li>`).join('') || '<li>No orders yet</li>'}</ul></div>
        <div class="report-card"><h3>📌 Order Summary by Status</h3>${Object.entries(statusSummary).map(([k,v]) => `<p>${k}: ${v}</p>`).join('')}</div>
      </div>
    `;
  }

  // Customer Panel
  function renderCustomer() {
    const categories = getData(STORAGE_KEYS.categories);
    const menuItems = getData(STORAGE_KEYS.menu_items).filter(i => i.available === true);
    const customerObj = getData(STORAGE_KEYS.customers).find(c => c.id === currentUser.customerId);
    const orderHistory = getCustomerOrderHistory(currentUser.customerId);
    const cartTotal = getCartTotal();

    return `
      <div class="top-bar">
        <div class="logo">FoodieDash <span>Customer</span></div>
        <div class="user-info">🍽️ ${customerObj?.name || currentUser.username} <button class="btn-logout" id="logoutBtn">Logout</button></div>
      </div>
      <div class="grid-2col">
        <!-- Menu browsing -->
        <div class="card">
          <h3>📜 Menu</h3>
          ${categories.map(cat => `<div><strong>${cat.name}</strong><div>${menuItems.filter(i=>i.category_id===cat.id).map(item => `<div class="menu-row"><span>${item.name} - $${item.price}</span><button class="addToCartBtn" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">➕ Add</button></div>`).join('') || '<i>No items</i>'}</div>`).join('')}
        </div>
        <!-- Shopping Cart -->
        <div class="card">
          <h3>🛒 Your Cart</h3>
          <div id="cartItems">${customerCart.length ? customerCart.map(i => `<div class="cart-item"><span>${i.name} x${i.quantity}</span><span>$${(i.price * i.quantity).toFixed(2)} <button class="qtyUp" data-id="${i.menuItemId}">+</button> <button class="qtyDown" data-id="${i.menuItemId}">-</button> <button class="removeCart" data-id="${i.menuItemId}">🗑️</button></span></div>`).join('') : '<p>Cart is empty</p>'}</div>
          <div class="total">Total: $${cartTotal.toFixed(2)}</div>
          <button id="placeOrderBtn" class="btn-order">✅ Place Order</button>
        </div>
      </div>
      <!-- Order History -->
      <div class="panel">
        <h2>📜 My Order History</h2>
        <table><thead><tr><th>Order ID</th><th>Date</th><th>Total</th><th>Status</th></tr></thead><tbody>${orderHistory.map(o => `<tr><td>#${o.id}</td><td>${new Date(o.order_date).toLocaleString()}</td><td>$${o.total_amount.toFixed(2)}</td><td><span class="order-status">${o.status}</span></td></tr>`).join('') || '<tr><td colspan="4">No orders yet</td></tr>'}</tbody></table>
      </div>
    `;
  }

  // attach event listeners after rendering
  function attachGlobalEvents() {
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    if (currentUser?.role === 'admin') {
      // Category events
      document.getElementById('addCatBtn')?.addEventListener('click', () => {
        const name = document.getElementById('catName').value;
        const desc = document.getElementById('catDesc').value;
        if(name) addCategory(name, desc);
      });
      document.querySelectorAll('.delCatBtn').forEach(btn => btn.addEventListener('click', (e) => { deleteCategory(parseInt(btn.dataset.id)); }));
      document.querySelectorAll('.editCatBtn').forEach(btn => btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        const newName = prompt('New category name', btn.dataset.name);
        const newDesc = prompt('New description', btn.dataset.desc);
        if(newName) updateCategory(id, newName, newDesc);
      }));
      document.getElementById('addItemBtn')?.addEventListener('click', () => {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const catId = document.getElementById('itemCatId').value;
        const avail = document.getElementById('itemAvail').value;
        if(name && price) addMenuItem(name, price, catId, avail);
      });
      document.querySelectorAll('.delItemBtn').forEach(btn => btn.addEventListener('click', (e) => deleteMenuItem(parseInt(btn.dataset.id))));
      document.querySelectorAll('.editItemBtn').forEach(btn => btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        const name = prompt('New name', btn.dataset.name);
        const price = prompt('New price', btn.dataset.price);
        const cat = prompt('Category ID', btn.dataset.cat);
        const avail = confirm('Available?');
        if(name && price) updateMenuItem(id, name, price, cat, avail);
      }));
      document.querySelectorAll('.statusSelect').forEach(select => select.addEventListener('change', (e) => updateOrderStatus(parseInt(select.dataset.id), select.value)));
      document.getElementById('dailyReportBtn')?.addEventListener('click', () => {
        const daily = getDailyMonthlySalesReport('daily');
        alert(`Today Sales: $${daily.totalSales.toFixed(2)} | Orders: ${daily.orderCount}`);
      });
    }
    if (currentUser?.role === 'customer') {
      document.querySelectorAll('.addToCartBtn').forEach(btn => btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        addToCart({ id, name, price });
      }));
      document.querySelectorAll('.qtyUp').forEach(btn => btn.addEventListener('click', (e) => updateQuantity(parseInt(btn.dataset.id), 1)));
      document.querySelectorAll('.qtyDown').forEach(btn => btn.addEventListener('click', (e) => updateQuantity(parseInt(btn.dataset.id), -1)));
      document.querySelectorAll('.removeCart').forEach(btn => btn.addEventListener('click', (e) => removeFromCart(parseInt(btn.dataset.id))));
      document.getElementById('placeOrderBtn')?.addEventListener('click', placeOrder);
    }
  }

  function renderApp() {
    const root = document.getElementById('app');
    if (!currentUser) {
      root.innerHTML = renderLogin();
      document.getElementById('doLoginBtn')?.addEventListener('click', () => {
        const uname = document.getElementById('loginUsername').value;
        const pwd = document.getElementById('loginPassword').value;
        if (login(uname, pwd)) renderApp();
        else alert('Invalid credentials');
      });
    } else if (currentUser.role === 'admin') {
      root.innerHTML = renderAdmin();
      attachGlobalEvents();
    } else if (currentUser.role === 'customer') {
      root.innerHTML = renderCustomer();
      attachGlobalEvents();
    }
  }

  initData();
  renderApp();
    </script>
</body>

</html>
